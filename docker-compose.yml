# TV Stack — Automated Media Server
#
# Usage:
#   1. Copy .env.example to .env and fill in your VPN credentials
#   2. Run: bash setup-folders.sh
#   3. Run: docker compose up -d
#
# VPN-protected services (qBittorrent, Prowlarr, FlareSolverr) route
# through Gluetun. If the VPN drops, all their traffic stops.
#
# Radarr, Sonarr, Lidarr, Bazarr, Jellyfin, and Seerr do NOT run through
# the VPN — they need direct network access for speed and local connectivity.
#
# $MEDIA_BASE (from .env, default /mnt/e/Media) mounts as /data inside each container:
#   /data/TV        → Sonarr root folder   (E:\Media\TV)
#   /data/Movies    → Radarr root folder   (E:\Media\Movies)
#   /data/Music     → Lidarr root folder   (E:\Media\Music)
#   /data/Downloads → qBittorrent download dir (E:\Media\Downloads)

networks:
  tvnetwork:
    name: tvnetwork
    ipam:
      config:
        - subnet: 172.39.0.0/24

services:

  # ============================================================
  # GLUETUN — VPN Container (kill switch + tunnel)
  # All VPN-protected services route through this container.
  # Ports for those services are mapped HERE, not on the services themselves.
  # Docs: https://github.com/qdm12/gluetun-wiki
  # ============================================================
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      tvnetwork:
        ipv4_address: ${IP_GLUETUN}
    ports:
      - 8080:8080     # qBittorrent WebUI
      - 6881:6881     # qBittorrent torrenting port
      - 6881:6881/udp
      - 9696:9696     # Prowlarr
      - 8191:8191     # FlareSolverr
    volumes:
      - ./gluetun:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      - VPN_PORT_FORWARDING=${VPN_PORT_FORWARDING}
      - FIREWALL_VPN_INPUT_PORTS=${FIREWALL_VPN_INPUT_PORTS}
      - TZ=${TZ}
    healthcheck:
      test: wget -qO /dev/null http://127.0.0.1:9999 || exit 1
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # QBITTORRENT — Torrent Client (VPN protected)
  # Downloads to /data/Downloads inside the container
  # = $MEDIA_BASE/Downloads on the host
  # ============================================================
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    labels:
      - deunhealth.restart.on.unhealthy=true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=002
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=${FIREWALL_VPN_INPUT_PORTS}
    volumes:
      - ./qbittorrent:/config
      - ${MEDIA_BASE:-/mnt/e/Media}:/data
    healthcheck:
      test: wget -q --spider http://localhost:8080 || exit 1
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ============================================================
  # DEUNHEALTH — Auto-restarts unhealthy containers
  # ============================================================
  deunhealth:
    image: qmcgaw/deunhealth
    container_name: deunhealth
    network_mode: none
    environment:
      - LOG_LEVEL=info
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999
      - TZ=${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

  # ============================================================
  # PROWLARR — Indexer Manager (VPN protected)
  # ============================================================
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=002
      - TZ=${TZ}
    volumes:
      - ./prowlarr:/config
    restart: unless-stopped

  # ============================================================
  # FLARESOLVERR — Cloudflare Bypass (VPN protected)
  # ============================================================
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    restart: unless-stopped

  # ============================================================
  # SABNZBD — Usenet Download Client
  # Connects to Eweka over SSL (port 563). No VPN needed —
  # Usenet uses encrypted NNTP and isn't tracked like torrents.
  # WebUI at localhost:8090
  # ============================================================
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=002
      - TZ=${TZ}
    volumes:
      - ./sabnzbd:/config
      - ${MEDIA_BASE:-/mnt/e/Media}:/data
    ports:
      - 8090:8080
    networks:
      tvnetwork:
        ipv4_address: ${IP_SABNZBD}
    restart: unless-stopped

  # ============================================================
  # RADARR — Movie Manager
  # Root folder: /data/Movies = $MEDIA_BASE/Movies
  # Download client category: movies → /data/Downloads/movies
  # ============================================================
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=002
      - TZ=${TZ}
    volumes:
      - ./radarr:/config
      - ${MEDIA_BASE:-/mnt/e/Media}:/data
    ports:
      - 7878:7878
    networks:
      tvnetwork:
        ipv4_address: ${IP_RADARR}
    restart: unless-stopped

  # ============================================================
  # SONARR — TV Show Manager
  # Root folder: /data/TV = $MEDIA_BASE/TV
  # Download client category: tv → /data/Downloads/tv
  # ============================================================
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=002
      - TZ=${TZ}
    volumes:
      - ./sonarr:/config
      - ${MEDIA_BASE:-/mnt/e/Media}:/data
    ports:
      - 8989:8989
    networks:
      tvnetwork:
        ipv4_address: ${IP_SONARR}
    restart: unless-stopped

  # ============================================================
  # LIDARR — Music Manager
  # Root folder: /data/Music = $MEDIA_BASE/Music
  # Download client category: music → /data/Downloads/music
  # ============================================================
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=002
      - TZ=${TZ}
    volumes:
      - ./lidarr:/config
      - ${MEDIA_BASE:-/mnt/e/Media}:/data
    ports:
      - 8686:8686
    networks:
      tvnetwork:
        ipv4_address: ${IP_LIDARR}
    restart: unless-stopped

  # ============================================================
  # BAZARR — Subtitle Manager
  # ============================================================
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=002
      - TZ=${TZ}
    volumes:
      - ./bazarr:/config
      - ${MEDIA_BASE:-/mnt/e/Media}:/data
    ports:
      - 6767:6767
    networks:
      tvnetwork:
        ipv4_address: ${IP_BAZARR}
    restart: unless-stopped


  # ============================================================
  # SEERR — Request System (Netflix-like UI)
  # Uses a named Docker volume to avoid permission/SQLite issues on WSL.
  # ============================================================
  seerr:
    image: ghcr.io/seerr-team/seerr:v3.0.1
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
      - PORT=5055
    volumes:
      - seerr_config:/app/config
    ports:
      - 5055:5055
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    networks:
      tvnetwork:
        ipv4_address: ${IP_SEERR}
    restart: unless-stopped

  # ============================================================
  # MEDIA-CHECK — Corruption & Language Scanner
  # Scans TV/movie files nightly (3 AM) via ffprobe. Notifies Discord
  # when files are corrupt, missing expected audio, or missing subtitles.
  # Requires RADARR_API_KEY and DISCORD_WEBHOOK in .env.
  # Manual run: docker exec media-check python check.py
  # ============================================================
  media-check:
    build: ./media-check
    container_name: media-check
    environment:
      - SONARR_URL=http://172.39.0.4:8989
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_URL=http://172.39.0.3:7878
      - RADARR_API_KEY=${RADARR_API_KEY}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
      - RECHECK_DAYS=${RECHECK_DAYS:-7}
      - TZ=${TZ}
    volumes:
      - ${MEDIA_BASE:-/mnt/e/Media}:/data:ro
      - ./media-check/data:/app/data
    networks:
      tvnetwork:
        ipv4_address: ${IP_MEDIA_CHECK}
    restart: unless-stopped

  # ============================================================
  # TAUTULLI — Plex Usage Analytics
  # Connects to Plex (Windows service) via 172.28.32.1:32400 (Windows host IP in WSL2).
  # host.docker.internal does not resolve in this setup — use the IP directly.
  # Sign in through the browser on first run — no manual token needed.
  # ============================================================
  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./tautulli:/config
    ports:
      - 8181:8181
    networks:
      tvnetwork:
        ipv4_address: ${IP_TAUTULLI}
    restart: unless-stopped

  # ============================================================
  # HOMEPAGE — System Dashboard
  # Health overview, service links, and live stats for all services.
  # Config lives in ./homepage/ — fill in API keys after first run.
  # ============================================================
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      - TZ=${TZ}
    volumes:
      - ./homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${MEDIA_BASE:-/mnt/e/Media}:/media:ro
    ports:
      - 3000:3000
    networks:
      tvnetwork:
        ipv4_address: ${IP_HOMEPAGE}
    restart: unless-stopped

  # ============================================================
  # TAILSCALE — Remote access VPN
  # Exposes all stack services via your Tailscale IP from anywhere.
  # Get an auth key at: https://login.tailscale.com/admin/settings/keys
  # ============================================================
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: tv-stack
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ./tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    restart: unless-stopped

volumes:
  seerr_config:
